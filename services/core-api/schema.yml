components:
  schemas:
    Class:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        lecturer:
          type: integer
        course_group:
          type: integer
        date_held:
          type: string
          format: date
      required:
      - course_group
      - date_held
      - id
      - lecturer
    Course:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        course_code:
          type: string
          maxLength: 30
        name:
          type: string
          maxLength: 255
        weekly_hours:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,1})?$
        weeks_count:
          type: integer
        ects:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,1})?$
        course_group:
          type: string
          nullable: true
          maxLength: 50
        course_type:
          $ref: '#/components/schemas/CourseTypeEnum'
        faculty:
          type: integer
      required:
      - course_code
      - course_type
      - faculty
      - id
      - name
      - weekly_hours
      - weeks_count
    CourseGroup:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        course:
          type: integer
        name:
          type: string
          maxLength: 100
        lecturer:
          type: integer
          nullable: true
        weekday:
          type: string
          maxLength: 10
        start_time:
          type: string
          format: time
        end_time:
          type: string
          format: time
        room:
          type: string
          maxLength: 50
        semester:
          type: integer
      required:
      - course
      - end_time
      - id
      - name
      - room
      - semester
      - start_time
      - weekday
    CourseTypeEnum:
      enum:
      - zal
      - zst
      - egz
      - ekm
      type: string
      description: |-
        * `zal` - Credit
        * `zst` - Graded Credit
        * `egz` - Exam
        * `ekm` - Committee Exam
    Faculty:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        description:
          type: string
          nullable: true
      required:
      - id
      - name
    Lecturer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        faculty:
          type: integer
        position:
          type: integer
          nullable: true
        status:
          $ref: '#/components/schemas/StatusEnum'
      required:
      - email
      - faculty
      - id
      - username
    PatchedClass:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        lecturer:
          type: integer
        course_group:
          type: integer
        date_held:
          type: string
          format: date
    PatchedCourse:
