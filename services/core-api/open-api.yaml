components:
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # ---------- university ----------
    Faculty:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        description:
          type: string
          nullable: true
      required:
        - id
        - name

    FacultyCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
      required:
        - name

    Position:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        hourly_rate:
          type: string
          description: Decimal as string (DRF DecimalField)
          example: "123.45"
        workload:
          type: integer
          description: One of the defined workload choices (20,30,40)
          enum: [40,20,30]
      required:
        - id
        - name
        - hourly_rate
        - workload

    PositionCreate:
      type: object
      properties:
        name:
          type: string
        hourly_rate:
          type: string
          example: "123.45"
        workload:
          type: integer
          enum: [40,20,30]
      required:
        - name
        - hourly_rate
        - workload

    Semester:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        faculty:
          type: integer
          description: Faculty PK
        type:
          type: string
          enum: [winter, summer]
        academic_year:
          type: string
          description: e.g. "2025/2026"
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
      required:
        - id
        - name
        - faculty
        - type
        - academic_year
        - start_date
        - end_date

    SemesterCreate:
      type: object
      properties:
        name:
          type: string
        faculty:
          type: integer
        type:
          type: string
          enum: [winter, summer]
        academic_year:
